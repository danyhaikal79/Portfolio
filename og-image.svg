<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
  </defs>

  <!-- Solid dark background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle bottom-right orange glow -->
  <ellipse cx="1200" cy="630" rx="500" ry="300" fill="#c2410c" opacity="0.18"/>

  <!-- Thin top border line (brand orange) -->
  <rect x="0" y="0" width="1200" height="6" fill="#c2410c"/>

  <!-- Greeting -->
  <text x="80" y="190"
        font-family="'Courier New', monospace" font-size="22"
        fill="#888888" letter-spacing="4">
    PORTFOLIO
  </text>

  <!-- Main headline -->
  <text x="80" y="320"
        font-family="Inter, Arial, sans-serif" font-weight="800" font-size="110"
        letter-spacing="-4" fill="#ffffff">
    Hi, I am <tspan fill="#c2410c">Dany.</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="395"
        font-family="Inter, Arial, sans-serif" font-weight="400" font-size="30"
        fill="#bcbcbc" letter-spacing="-0.3">
    Final-year Computer &amp; Communication Systems Engineering student at UPM.
  </text>

  <!-- Tagline -->
  <text x="80" y="445"
        font-family="Inter, Arial, sans-serif" font-weight="500" font-size="28"
        fill="#ffffff" letter-spacing="-0.3">
    Embedded firmware. Edge AI. Industrial IoT.
  </text>

  <!-- Bottom row: availability and URL -->
  <g transform="translate(80, 540)">
    <!-- Status dot -->
    <circle cx="10" cy="20" r="8" fill="#22c55e"/>
    <circle cx="10" cy="20" r="14" fill="#22c55e" fill-opacity="0.25"/>
    <text x="34" y="26"
          font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500"
          fill="#ffffff">
      Available · 1 September 2026
    </text>
  </g>

  <!-- URL bottom-right -->
  <text x="1120" y="566"
        text-anchor="end"
        font-family="'Courier New', monospace" font-size="20"
        fill="#888888" letter-spacing="0.5">
    danyhaikal79.github.io/Portfolio
  </text>
</svg>
