<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="15%" r="50%">
      <stop offset="0%" stop-color="#c2410c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- DH Logo top-left -->
  <g transform="translate(80, 80)">
    <rect width="80" height="80" rx="16" ry="16" fill="#ffffff"/>
    <text x="40" y="40"
          text-anchor="middle"
          dominant-baseline="central"
          font-family="Inter, Arial, sans-serif"
          font-weight="700"
          font-size="34"
          letter-spacing="-1"
          fill="#0a0a0a">DH</text>
    <circle cx="68" cy="14" r="5" fill="#c2410c"/>
  </g>

  <!-- Eyebrow tag -->
  <text x="80" y="240"
        font-family="'Courier New', monospace"
        font-size="20"
        fill="#c2410c"
        letter-spacing="2">
    COMPUTER &amp; COMMUNICATION SYSTEMS ENGINEER
  </text>

  <!-- Main name -->
  <text x="80" y="330"
        font-family="Inter, Arial, sans-serif"
        font-weight="800"
        font-size="84"
        letter-spacing="-3"
        fill="#ffffff">DANY HAIKAL</text>

  <!-- Tagline -->
  <text x="80" y="410"
        font-family="Inter, Arial, sans-serif"
        font-weight="500"
        font-size="36"
        fill="#b8b8b8">
    Engineer. Builder. <tspan fill="#c2410c" font-weight="600">Problem Solver.</tspan>
  </text>

  <!-- Bottom pills -->
  <g font-family="Inter, Arial, sans-serif" font-size="22" fill="#ffffff" font-weight="500">
    <g transform="translate(80, 490)">
      <rect width="160" height="48" rx="24" ry="24" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
      <text x="80" y="24" text-anchor="middle" dominant-baseline="central">AI / ML</text>
    </g>
    <g transform="translate(260, 490)">
      <rect width="200" height="48" rx="24" ry="24" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
      <text x="100" y="24" text-anchor="middle" dominant-baseline="central">IoT &amp; Embedded</text>
    </g>
    <g transform="translate(480, 490)">
      <rect width="180" height="48" rx="24" ry="24" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
      <text x="90" y="24" text-anchor="middle" dominant-baseline="central">Networking</text>
    </g>
    <g transform="translate(680, 490)">
      <rect width="180" height="48" rx="24" ry="24" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
      <text x="90" y="24" text-anchor="middle" dominant-baseline="central">FPGA</text>
    </g>
  </g>

  <!-- Footer URL -->
  <text x="80" y="590"
        font-family="'Courier New', monospace"
        font-size="18"
        fill="#666666">
    danyhaikal79.github.io/Portfolio · Available September 2026
  </text>

  <!-- Decorative corner -->
  <g transform="translate(1000, 80)">
    <circle cx="60" cy="60" r="60" fill="none" stroke="#c2410c" stroke-opacity="0.3" stroke-width="2"/>
    <circle cx="60" cy="60" r="40" fill="none" stroke="#c2410c" stroke-opacity="0.5" stroke-width="2"/>
    <circle cx="60" cy="60" r="20" fill="#c2410c"/>
  </g>
</svg>
