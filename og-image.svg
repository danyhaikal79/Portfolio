<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#181818"/>
    </linearGradient>
    <radialGradient id="glow" cx="92%" cy="8%" r="55%">
      <stop offset="0%" stop-color="#c2410c" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle horizontal grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- DH Logo top-left -->
  <g transform="translate(72, 60)">
    <rect width="68" height="68" rx="14" ry="14" fill="#ffffff"/>
    <text x="34" y="36"
          text-anchor="middle" dominant-baseline="central"
          font-family="Inter, Arial, sans-serif" font-weight="800" font-size="28"
          letter-spacing="-1" fill="#0a0a0a">DH</text>
    <circle cx="58" cy="10" r="5" fill="#c2410c"/>
  </g>

  <!-- Availability badge top-right -->
  <g transform="translate(870, 70)">
    <rect width="260" height="48" rx="24" ry="24"
          fill="rgba(255,255,255,0.04)"
          stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle cx="26" cy="24" r="7" fill="#22c55e"/>
    <circle cx="26" cy="24" r="11" fill="#22c55e" fill-opacity="0.25"/>
    <text x="46" y="24"
          font-family="'Courier New', monospace" font-size="15"
          fill="#ffffff" dominant-baseline="central" letter-spacing="0.5">
      Available · Sept 2026
    </text>
  </g>

  <!-- Eyebrow -->
  <text x="72" y="245"
        font-family="'Courier New', monospace" font-size="19"
        fill="#c2410c" letter-spacing="3" font-weight="600">
    FINAL-YEAR CCSE STUDENT · UPM
  </text>

  <!-- Main name -->
  <text x="72" y="335"
        font-family="Inter, Arial, sans-serif" font-weight="800" font-size="82"
        letter-spacing="-3" fill="#ffffff">
    DANY HAIKAL
  </text>

  <!-- Accent dot under name -->
  <circle cx="650" cy="320" r="9" fill="#c2410c"/>

  <!-- Tagline -->
  <text x="72" y="405"
        font-family="Inter, Arial, sans-serif" font-weight="500" font-size="30"
        fill="#cccccc" letter-spacing="-0.5">
    Embedded Firmware. Edge AI. Industrial IoT.
  </text>

  <!-- Skill pills -->
  <g font-family="Inter, Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="500">
    <g transform="translate(72, 480)">
      <rect width="110" height="46" rx="23" ry="23"
            fill="rgba(255,255,255,0.04)"
            stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
      <text x="55" y="23" text-anchor="middle" dominant-baseline="central">ESP32</text>
    </g>
    <g transform="translate(196, 480)">
      <rect width="160" height="46" rx="23" ry="23"
            fill="rgba(255,255,255,0.04)"
            stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
      <text x="80" y="23" text-anchor="middle" dominant-baseline="central">Jetson Nano</text>
    </g>
    <g transform="translate(370, 480)">
      <rect width="140" height="46" rx="23" ry="23"
            fill="rgba(255,255,255,0.04)"
            stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
      <text x="70" y="23" text-anchor="middle" dominant-baseline="central">LoRaWAN</text>
    </g>
    <g transform="translate(524, 480)">
      <rect width="120" height="46" rx="23" ry="23"
            fill="rgba(255,255,255,0.04)"
            stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
      <text x="60" y="23" text-anchor="middle" dominant-baseline="central">Verilog</text>
    </g>
    <g transform="translate(658, 480)">
      <rect width="170" height="46" rx="23" ry="23"
            fill="rgba(255,255,255,0.04)"
            stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
      <text x="85" y="23" text-anchor="middle" dominant-baseline="central">PyTorch YOLO</text>
    </g>
  </g>

  <!-- Footer URL -->
  <text x="72" y="588"
        font-family="'Courier New', monospace" font-size="17"
        fill="#888888" letter-spacing="0.5">
    danyhaikal79.github.io/Portfolio
  </text>

  <!-- Decorative concentric circles top-right -->
  <g transform="translate(1080, 540)" opacity="0.5">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#c2410c" stroke-opacity="0.25" stroke-width="2"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#c2410c" stroke-opacity="0.4" stroke-width="2"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#c2410c" stroke-opacity="0.6" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#c2410c"/>
  </g>
</svg>
